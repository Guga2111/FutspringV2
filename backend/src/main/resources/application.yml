spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/futspring}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:devSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmSecurity}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
