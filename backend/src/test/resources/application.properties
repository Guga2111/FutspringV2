spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
app.jwt.secret=test-secret-key-that-is-at-least-32-characters-long-for-hmac
app.jwt.expiration-ms=3600000
app.uploads.dir=${java.io.tmpdir}/futspring-test-uploads
spring.jpa.show-sql=false
spring.main.allow-bean-definition-overriding=true
